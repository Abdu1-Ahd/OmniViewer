name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Package & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package --no-dependencies
        # Creates omniviewer-x.y.z.vsix in the project root

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
        # Secret: OVSX_TOKEN — add in repo Settings > Secrets > Actions

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}
        # Secret: VSCE_PAT — add in repo Settings > Secrets > Actions
